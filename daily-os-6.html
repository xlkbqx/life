<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loren's life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14140f;
    --surface: #233126;
    --surface-2: #4A1A23;
    --line: rgba(216,208,194,0.14);
    --text: #D8D0C2;
    --text-muted: #9CAB91;
    --bordeaux: #4A1A23;
    --hunter: #233126;
    --sage: #6A7657;
    --bone: #D8D0C2;
    --cedar: #8C603E;
    --menstrual: #BC4A5C;
    --folicular: var(--sage);
    --ovulatoria: var(--cedar);
    --lutea: var(--bone);
    --accent: var(--cedar);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  img, svg, input, textarea, select{ max-width: 100%; }
  .rit-row, .rit-row > span, .pocket-head, .el-head, label.rit-row, .grocery-list li, .grocery-list li > label, .meal-row{ min-width: 0; }
  .rit-item-name, .rit-item-desc, .gname, .meal-row, .debt-name, .plant-desc{ overflow-wrap: anywhere; word-break: break-word; }
  html,body{margin:0;padding:0; max-width:100%; overflow-x:hidden;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 18px 60px;
  }
  .wrap{max-width: 720px; margin: 0 auto;}

  .brand{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .brand-logo{ width: 38px; height: 38px; flex-shrink:0; color: var(--cedar); }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 34px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .nav{
    display:flex;
    gap: 6px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    overflow-x:auto;
  }
  .nav button{
    background:none;
    border:none;
    color: var(--text-muted);
    font-family:'Work Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .nav button.active{
    color: var(--text);
    border-bottom: 2px solid var(--accent);
    font-weight: 500;
  }
  .nav button:disabled{
    cursor: default;
    opacity: 0.45;
  }

  /* ---- Setup card ---- */
  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 20px;
  }
  .card h2{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 8px;
  }
  .card p.hint{
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 20px;
    line-height: 1.5;
  }
  label{
    display:block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field{margin-bottom: 18px;}
  input[type=date], input[type=number]{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Work Sans', sans-serif;
  }
  input:focus{outline: 2px solid var(--accent); outline-offset: 1px;}
  .btn{
    background: var(--accent);
    color: var(--bone);
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }
  .btn.ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    font-weight: 500;
  }
  .row{display:flex; gap: 12px; flex-wrap: wrap; align-items:center;}
  @media (max-width: 420px){ .row{ flex-direction: column; align-items: stretch; } .row > *{ min-width: 0 !important; width: 100%; } }

  /* ---- Dial ---- */
  .intention-card{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.5;
    text-align: center;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 11px 14px;
    margin-bottom: 24px;
  }

  .dial-section{
    display:flex;
    flex-direction: column;
    align-items:center;
    text-align:center;
    margin-bottom: 30px;
  }
  .dial-wrap{position:relative; width: 188px; height: 188px;}
  .dial-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .moon-glyph{font-size: 24px; line-height:1;}
  .day-number{
    font-family:'JetBrains Mono', monospace;
    font-size: 23px;
    margin-top: 4px;
  }
  .day-total{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .phase-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    margin-top: 14px;
  }
  .phase-energy{
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 4px;
    max-width: 380px;
  }
  .settings-link{
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }

  /* ---- Elements grid ---- */
  .section-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .section-sub{
    color: var(--text-muted);
    font-size: 13px;
    margin: 0 0 18px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (max-width: 520px){ .grid{grid-template-columns: 1fr;} }

  .el-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 11px;
    position: relative;
  }
  .el-head{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .glyph{width: 26px; height: 26px; flex-shrink:0;}
  .el-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
  }
  .el-sub{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .el-activity{
    font-size: 14.5px;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .check-row{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor:pointer;
  }
  .check-row input{accent-color: var(--accent);}
  .el-card.done{ border-color: var(--el-color); }

  textarea{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13.5px;
    resize: vertical;
    min-height: 64px;
    margin-top: 10px;
  }
  textarea:focus{outline: 2px solid var(--accent); outline-offset: 1px;}

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    opacity:0;
    transition: opacity 0.25s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(15,12,22,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 10;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    max-width: 380px;
    width: 100%;
  }

  .loading{ color: var(--text-muted); font-size: 14px; padding: 40px 0; text-align:center; }

  /* ---- Rituales ---- */
  .rit-block{ margin-bottom: 22px; }
  .rit-head{
    display:flex;
    align-items:baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .rit-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
  }
  .rit-tag{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .rit-sub{ color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }

  .rit-group-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 0 10px;
  }
  .rit-group-label:first-child{ margin-top: 0; }

  .rit-item{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .rit-item.done{ border-color: var(--accent); }
  .rit-item.muted{ opacity: 0.5; }
  .rit-row{
    display:flex;
    align-items:flex-start;
    gap: 12px;
  }
  .rit-row input[type=checkbox]{
    margin-top: 2px;
    accent-color: var(--accent);
    width: 17px; height: 17px;
    flex-shrink:0;
  }
  .rit-item-name{ font-size: 13.5px; font-weight: 500; }
  .rit-item-desc{ font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

  .week-strip{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 12px;
  }
  .week-day{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 4px;
    text-align:center;
  }
  .week-day.today{ border-color: var(--accent); }
  .week-day .wd-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .week-day .wd-task{ font-size: 10.5px; margin-top: 4px; line-height: 1.3; min-height: 26px; }

  .progress-bar{
    background: var(--surface-2);
    border-radius: 999px;
    height: 8px;
    overflow:hidden;
    margin: 10px 0 8px;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .quick-add{ display:flex; gap: 8px; flex-wrap:wrap; margin-top: 10px; }
  .qbtn{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .qbtn:hover{ border-color: var(--accent); }
  .goal-edit{
    font-size: 12px;
    color: var(--text-muted);
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    margin-left: 6px;
    font-family:'Work Sans', sans-serif;
  }

  /* ---- Nutrición ---- */
  .menu-toggle{
    display:flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .menu-toggle button{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .menu-toggle button.active{
    color: var(--text);
    border-color: var(--accent);
  }
  .meal-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 11px;
    margin-bottom: 12px;
  }
  .meal-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .meal-row{
    font-size: 13.5px;
    line-height: 1.6;
    margin-bottom: 2px;
  }
  .meal-row b{ color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; margin-right: 6px;}
  .prep-box{
    background: var(--surface-2);
    border-radius: 12px;
    padding: 9px 11px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .prep-box b{ color: var(--text); }

  .supp-row, .water-row{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    gap: 12px;
  }
  .supp-row.done{ border-color: var(--accent); }
  .supp-row input{ width: 17px; height: 17px; accent-color: var(--accent); flex-shrink:0; }
  .water-track{
    display:flex;
    flex-wrap:wrap;
    gap: 6px;
    margin: 10px 0;
  }
  .water-glass{
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--surface-2);
  }
  .water-glass.filled{ background: var(--accent); border-color: var(--accent); }

  .grocery-section{ margin-bottom: 22px; }
  .grocery-list{ list-style:none; padding:0; margin: 0; }
  .grocery-list li{
    display:flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .grocery-list li .gname{ flex:1; }
  .grocery-list li .gprice{ color: var(--text-muted); font-family:'JetBrains Mono', monospace; font-size: 12px; white-space:nowrap; }
  .grocery-total{
    margin-top: 10px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--accent);
  }
  .assumption{
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ---- Ejercicio ---- */
  .phase-alert{
    background: var(--surface-2);
    border: 1px solid var(--menstrual);
    border-radius: 14px;
    padding: 8px 10px;
    margin-bottom: 20px;
    font-size: 13.5px;
    line-height: 1.55;
  }
  .phase-alert b{ color: var(--menstrual); }
  .today-exercise{
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 11px;
    margin-bottom: 22px;
  }
  .today-exercise .ex-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .today-exercise .ex-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    margin-bottom: 10px;
  }
  .ex-list{ margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.7; }
  .week-ex-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .week-ex-row.today-row{ color: var(--accent); font-weight: 500; }
  .week-ex-row .wd{ width: 70px; color: var(--text-muted); font-family:'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; }

  /* ---- Hogar ---- */
  .plant-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .plant-name{ font-family:'Fraunces', serif; font-style: italic; font-size: 15px; margin-bottom: 4px; }
  .plant-water{ font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .plant-desc{ font-size: 13px; color: var(--text-muted); line-height: 1.5; }

  /* ---- Learning ---- */
  .chunk-chip{
    display:inline-block;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12.5px;
    margin: 3px 4px 0 0;
    font-family:'JetBrains Mono', monospace;
  }
  .stage-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .stage-title{ font-family:'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--accent); margin-bottom: 4px; }

  /* ---- Finanzas ---- */
  .fin-summary{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin: 14px 0;
  }
  @media (max-width: 520px){ .fin-summary{ grid-template-columns: repeat(2, 1fr); } }
  .fin-stat{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 9px 11px;
  }
  .fin-stat .fin-label{ font-family:'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .fin-stat .fin-value{ font-family:'Fraunces', serif; font-size: 18px; margin-top: 4px; }
  .pocket-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 16px;
  }
  .pocket-head{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .pocket-title{ font-family:'Fraunces', serif; font-style: italic; font-size: 18px; }
  .pocket-available{ font-family:'JetBrains Mono', monospace; font-size: 15px; color: var(--accent); }
  .debt-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 9px 10px;
    margin-bottom: 10px;
  }
  .debt-name{ font-family:'Fraunces', serif; font-style: italic; font-size: 16px; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="currentColor" stroke-width="1.1">
        <g transform="translate(26,28)">
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(45)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(90)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(135)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(180)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(225)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(270)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(315)"/>
          <circle cx="0" cy="0" r="1.6" fill="currentColor" stroke="none"/>
        </g>
        <path d="M47,12 C47.3,15 48,15.7 51,16 C48,16.3 47.3,17 47,20 C46.7,17 46,16.3 43,16 C46,15.7 46.7,15 47,12 Z" fill="currentColor" stroke="none"/>
        <path d="M11,42 C11.2,44 11.6,44.4 13.5,44.6 C11.6,44.8 11.2,45.2 11,47.2 C10.8,45.2 10.4,44.8 8.5,44.6 C10.4,44.4 10.8,44 11,42 Z" fill="currentColor" stroke="none"/>
        <path d="M9,10 C9.15,11.3 9.4,11.55 10.6,11.7 C9.4,11.85 9.15,12.1 9,13.4 C8.85,12.1 8.6,11.85 7.4,11.7 C8.6,11.55 8.85,11.3 9,10 Z" fill="currentColor" stroke="none"/>
      </g>
    </svg>
    <h1>Loren's life</h1>
  </div>

// ---------- Polyfill de almacenamiento ----------
// window.storage solo existe dentro de los artifacts de Claude.ai.
// Fuera de ahí (como al abrir esto desde GitHub) no existe, y por eso
// el ciclo, los rituales, etc. parecían no calcular nada: cada lectura
// fallaba en silencio. Aquí lo recreamos con localStorage para que
// funcione igual dentro y fuera de Claude.
if (typeof window.storage === 'undefined') {
  const NS = 'daily-os:';
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem(NS + key);
      if(raw === null) throw new Error('Key not found: ' + key);
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(NS + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(NS + key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const p = NS + (prefix || '');
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k && k.indexOf(p) === 0) keys.push(k.slice(NS.length));
      }
      return { keys, prefix, shared: !!shared };
    }
  };
}

function triGlyph(kind){
  // minimal alchemical-style glyphs as inline SVG strings
  if(kind==='up') return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,4 23,21 3,21" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>`;
  if(kind==='down') return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,22 3,5 23,5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>`;
  if(kind==='up-bar') return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,4 23,21 3,21" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="7" y1="15" x2="19" y2="15" stroke="currentColor" stroke-width="1.6"/></svg>`;
  return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,22 3,5 23,5" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="7" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1.6"/></svg>`;
}

function phaseForDay(dayInCycle, cycleLength){
  const frac = dayInCycle / cycleLength;
  if(frac <= 0.18) return 'menstrual';
  if(frac <= 0.46) return 'folicular';
  if(frac <= 0.57) return 'ovulatoria';
  return 'lutea';
}

function diffInDays(a,b){
  const ms = b.setHours(0,0,0,0) - a.setHours(0,0,0,0);
  return Math.floor(ms / 86400000);
}

function getCycleInfo(config){
  const start = new Date(config.lastPeriodStart + 'T00:00:00');
  const today = new Date();
  let elapsed = diffInDays(new Date(start), new Date(today));
  if(elapsed < 0) elapsed = 0;
  const dayInCycle = (elapsed % config.cycleLength) + 1;
  const phaseKey = phaseForDay(dayInCycle, config.cycleLength);
  return { dayInCycle, cycleLength: config.cycleLength, phaseKey, fraction: dayInCycle / config.cycleLength };
}

function getWeekKey(date){
  const d = new Date(date);
  const dow = (d.getDay() + 6) % 7; // 0 = lunes
  d.setDate(d.getDate() - dow);
  return d.toISOString().slice(0,10);
}
function nextMonday(date){
  const d = new Date(date);
  const dow = d.getDay();
  const add = dow === 1 ? 7 : ((8 - dow) % 7 || 7);
  d.setDate(d.getDate() + add);
  return d;
}
function fmtShort(d){
  return d.toLocaleDateString('es-CO', {day:'numeric', month:'short'});
}

function isSucculentWeek(date){
  const ref = new Date('2026-01-05T00:00:00'); // lunes de referencia
  const weeksSince = Math.floor((date - ref) / (7*86400000));
  return ((weeksSince % 2) + 2) % 2 === 0;
}

function hashStringToInt(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){
    hash = (hash * 31 + str.charCodeAt(i)) % 100000;
  }
  return Math.abs(hash);
}

function getDailyIntention(dateKey){
  const idx = hashStringToInt(dateKey) % INTENTIONS.length;
  return INTENTIONS[idx];
}

function getWeekPosition(date){
  return (date.getDay() + 6) % 7; // 0 = lunes ... 6 = domingo
}

function arcSegments(cx, cy, r){
  // four quadrant arcs colored by phase, starting at top, clockwise
  const bounds = [0, 0.18, 0.46, 0.57, 1];
  const keys = ['menstrual','folicular','ovulatoria','lutea'];
  let svg = '';
  for(let i=0;i<4;i++){
    const a0 = bounds[i]*360 - 90;
    const a1 = bounds[i+1]*360 - 90;
    svg += describeArc(cx, cy, r, a0, a1, PHASES[keys[i]].color);
  }
  return svg;
}
function describeArc(cx, cy, r, a0, a1, color){
  const start = polarToCartesian(cx, cy, r, a1);
  const end = polarToCartesian(cx, cy, r, a0);
  const largeArc = (a1 - a0) <= 180 ? 0 : 1;
  return `<path d="M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round" opacity="0.85"/>`;
}
function polarToCartesian(cx, cy, r, angleDeg){
  const a = angleDeg * Math.PI / 180;
  return { x: (cx + r*Math.cos(a)).toFixed(1), y: (cy + r*Math.sin(a)).toFixed(1) };
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openSettingsModal(config){

}

    const val = prompt('¿Cuántas horas a la semana quieres leer?', config.readingGoalHours);
    if(val && !isNaN(parseFloat(val))){
      config.readingGoalHours = parseFloat(val);
      await saveRitualConfig(config);
      renderRituales();
    }
  };

  // ---- Aprendizaje (weekly, time-based, igual que lectura) ----
  const learningGoalMinutes = config.learningGoalHours * 60;

  learningItem.innerHTML = `

      <button class="goal-edit" id="editLearningGoal">cambiar meta</button>
    </div>

      <button class="qbtn" data-min="30">+30 min</button>
      <button class="qbtn" data-min="60">+60 min</button>
    </div>
  `;
  learningItem.querySelectorAll('.qbtn').forEach(btn=>{
    btn.onclick = async ()=>{
      weekData.learningMinutes += parseInt(btn.dataset.min, 10);
      await saveRitualWeek(weekKey, weekData);
      renderRituales();
    };
  });
  document.getElementById('editLearningGoal').onclick = async ()=>{
    const val = prompt('¿Cuántas horas a la semana quieres dedicar a aprender?', config.learningGoalHours);
    if(val && !isNaN(parseFloat(val))){
      config.learningGoalHours = parseFloat(val);
      await saveRitualConfig(config);
      renderRituales();
    }
  };

  // ---- Meditation (weekly, 2x target) ----
  const meditationItem = document.getElementById('meditationItem');
  meditationItem.innerHTML = `
    <div class="rit-item-name">Meditación</div>
    <div class="rit-item-desc">${weekData.meditationCount} de 2 sesiones esta semana</div>
    <div class="quick-add">
      <button class="qbtn" id="med-add">+1 sesión</button>
      ${weekData.meditationCount > 0 ? '<button class="qbtn" id="med-remove">-1</button>' : ''}
    </div>
  `;
  document.getElementById('med-add').onclick = async ()=>{
    weekData.meditationCount += 1;
    await saveRitualWeek(weekKey, weekData);
    renderRituales();
  };
  const medRemove = document.getElementById('med-remove');
  if(medRemove) medRemove.onclick = async ()=>{
    weekData.meditationCount = Math.max(0, weekData.meditationCount - 1);
    await saveRitualWeek(weekKey, weekData);
    renderRituales();
  };
}

// ---------- Ejercicio: render ----------
async function renderEjercicio(){
  const today = new Date();
  const dow = today.getDay();
  const config = await loadConfig();

  let phaseAlert = '';
  if(isValidConfig(config)){
    const info = getCycleInfo(config);
    if(info.phaseKey === 'menstrual'){
      phaseAlert = `
        <div class="phase-alert">
          <b>Estás en fase menstrual.</b> Baja todos los pesos un 30% aprox. y las series de fuerza a la mitad. Sube el cardio a 5 veces por semana, 30 minutos mínimo. Si el sangrado es abundante hoy, no entrenes fuerza — solo cardio suave si quieres, o descansa por completo.
        </div>`;
    }
  }

  const todayEx = WEEKDAY_EXERCISE[dow];
  let todayBody = '';
  if(todayEx.type === 'pesas'){
    todayBody = `
      <div class="ex-label">Pesas</div>
      <div class="ex-title">${GYM_DAY_GLUTEO.title}</div>
      <ul class="ex-list">${GYM_DAY_GLUTEO.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    `;
  } else if(todayEx.items){
    todayBody = `
      <div class="ex-label">${todayEx.type === 'fijo' ? 'Día fijo' : 'Boost del día'}</div>
      <div class="ex-title">${todayEx.title}</div>
      <ul class="ex-list">${todayEx.items.map(i=>`<li>${i}</li>`).join('')}</ul>
      ${todayEx.why ? `<div class="prep-box"><b>Por qué:</b> ${todayEx.why}</div>` : ''}
    `;
  } else {
    todayBody = `
      <div class="ex-label">${todayEx.type === 'fijo' ? 'Día fijo' : 'Boost del día'}</div>
      <div class="ex-title">${todayEx.title}</div>
      <div class="rit-item-desc" style="margin-bottom:8px;">${todayEx.detail}</div>
      ${todayEx.why ? `<div class="prep-box"><b>Por qué:</b> ${todayEx.why}</div>` : ''}
    `;
  }

  app.innerHTML = `
    ${phaseAlert}
    <div class="today-exercise">${todayBody}</div>

    <div class="section-title">Tu semana</div>
    <div class="section-sub">Lunes y miércoles fijos, sábado siempre es glúteo, el resto son 20 min de pilates repartidos por grupo muscular en lo que el sábado no cubre.</div>
    <div id="weekExList"></div>
  `;

  const weekList = document.getElementById('weekExList');
  for(let i=1;i<=7;i++){
    const d = new Date(today);
    d.setDate(today.getDate() - dow + (i % 7)); // lunes(1)...domingo(0/7)
    const dayIndex = d.getDay();
    const ex = WEEKDAY_EXERCISE[dayIndex];
    const isToday = dayIndex === dow;
    const label = ex.type === 'pesas' ? GYM_DAY_GLUTEO.title : ex.title;
    const row = document.createElement('div');
    row.className = 'week-ex-row' + (isToday ? ' today-row' : '');
    row.innerHTML = `<span class="wd">${WEEKDAY_SHORT[dayIndex]}</span><span>${label}</span>`;
    weekList.appendChild(row);
  }
}

  // ---- Diagnóstico de déficit ----

    if(surplus < 0){
      const sorted = [...FINANZAS_EXPENSES].sort((a,b)=>b.amount-a.amount).slice(0,5);

          <div class="rit-item-desc">Deuda total: $${d.total.toLocaleString('es-CO')} · Tasa: ${d.rate}</div>
          <div class="rit-item-desc">Cuota ${d.cuotaReal ? 'mínima' : ''}: $${d.cuota.toLocaleString('es-CO')}${d.cuotaReal ? ` · Estás pagando: $${d.cuotaReal.toLocaleString('es-CO')} (abono extra)` : ''}</div>
          <div class="rit-item-desc">Vas en la cuota ${d.paymentsDone} de ${d.paymentsTotal} (${Math.round(d.paymentsDone/d.paymentsTotal*100)}% del plazo)</div>
        </div>
      `).join('')}
      <div id="pocketItems-${pocket.replace(/[^a-zA-Z]/g,'')}"></div>
    `;
    pocketsArea.appendChild(card);

    const itemsContainer = card.querySelector(`#pocketItems-${pocket.replace(/[^a-zA-Z]/g,'')}`);
    items.forEach(item=>{
      if(item.name === 'Mercado'){
        const acumulado = monthData['mercado-acumulado'] || 0;
        const restante = item.amount - acumulado;
        const mercadoPct = Math.min(100, Math.round((acumulado/item.amount)*100));
        const restanteText = restante >= 0
          ? `Disponible $${restante.toLocaleString('es-CO')}`
          : `Te excediste por $${Math.abs(restante).toLocaleString('es-CO')}`;
        const row = document.createElement('div');
        row.className = 'rit-item' + (acumulado >= item.amount ? ' done' : '');
        row.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="rit-item-name">Mercado <span class="rit-item-desc">Día ${item.day} · vas comprando de a poco</span></div>
            <span class="gprice">$${item.amount.toLocaleString('es-CO')}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${mercadoPct}%"></div></div>
          <div class="rit-item-desc">Acumulado $${acumulado.toLocaleString('es-CO')} · ${restanteText}</div>
          <div class="quick-add" style="margin-top:8px;">
            <input type="number" id="mercadoInput" placeholder="Monto de hoy" style="flex:1; min-width:100px; max-width:160px; background:var(--surface-2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:6px 10px; font-size:13px;">
            <button class="qbtn" id="mercadoAddBtn">Agregar gasto</button>
            <button class="qbtn" id="mercadoResetBtn">Reiniciar mercado</button>
          </div>
        `;
        itemsContainer.appendChild(row);
        document.getElementById('mercadoAddBtn').onclick = async ()=>{
          const val = parseFloat(document.getElementById('mercadoInput').value);
          if(isNaN(val) || val <= 0){ showToast('Ingresa un monto válido.'); return; }
          monthData['mercado-acumulado'] = (monthData['mercado-acumulado'] || 0) + val;
          await saveFinanzasMonth(monthKey, monthData);
          renderFinanzas();
        };
        document.getElementById('mercadoResetBtn').onclick = async ()=>{
          monthData['mercado-acumulado'] = 0;
          await saveFinanzasMonth(monthKey, monthData);
          renderFinanzas();
        };
        return;
      }

      const checked = !!monthData[item.name + '-' + item.day];
      const row = document.createElement('div');
      row.className = 'rit-item' + (checked ? ' done' : '');
      row.innerHTML = `<label class="rit-row" style="justify-content:space-between; display:flex; align-items:center;">
          <span style="display:flex; align-items:center; gap:10px;">
            <input type="checkbox" ${checked ? 'checked' : ''}>
            <span><div class="rit-item-name">${item.name}</div><div class="rit-item-desc">Día ${item.day}</div></span>
          </span>
          <span class="gprice">$${item.amount.toLocaleString('es-CO')}</span>
        </label>`;
      row.querySelector('input').onchange = async (e)=>{
        monthData[item.name + '-' + item.day] = e.target.checked;
        await saveFinanzasMonth(monthKey, monthData);
        renderFinanzas();
      };
      itemsContainer.appendChild(row);
    });
  });

  const investList = document.getElementById('investList');
  FINANZAS_INVESTMENTS.forEach(inv=>{
    const card = document.createElement('div');
    card.className = 'debt-card';
    card.innerHTML = `
      <div class="debt-name">${inv.name}</div>
      <div class="rit-item-desc">Invertido: $${inv.invested.toLocaleString('es-CO')} · Rentabilidad esperada: $${inv.expectedReturn.toLocaleString('es-CO')} · Total: $${inv.total.toLocaleString('es-CO')}</div>
      <div class="rit-item-desc">${inv.date}</div>
    `;
    investList.appendChild(card);
  });

  // ---- Proyección ----
  const projectionBlock = document.getElementById('projectionBlock');
  if(income && surplus !== null){
    const p6 = surplus * 6;
    const p12 = surplus * 12;
    projectionBlock.innerHTML = `
      <div class="rit-head"><span class="rit-title">Proyección</span><span class="rit-tag">solo efectivo, sin rendimientos</span></div>
      <div class="meal-card">
        <div class="meal-row"><b>En 6 meses</b>${surplus>=0 ? '+' : ''}$${p6.toLocaleString('es-CO')}</div>
        <div class="meal-row"><b>En 12 meses</b>${surplus>=0 ? '+' : ''}$${p12.toLocaleString('es-CO')}</div>
      </div>
      <div class="assumption">Proyección simple (superávit × meses), sin contar el crecimiento de tu CDT ni de Happi — esos van aparte, ni la reducción de tu deuda Scotiabank por los abonos extra. ${surplus<0 ? 'Tu flujo actual está en déficit: revisa el plan de optimización abajo antes de comprometer más gastos.' : ''}</div>
    `;
  } else {
    projectionBlock.innerHTML = `
      <div class="rit-head"><span class="rit-title">Proyección</span></div>
      <p class="rit-item-desc">Define tu ingreso mensual arriba para ver tu proyección a 6 y 12 meses.</p>
    `;
  }

  // ---- Action items ----
  const actionsList = document.getElementById('actionsList');
  FINANZAS_ACTIONS.forEach(a=>{
    const checked = !!actionsData[a.id];
    const el = document.createElement('div');
    el.className = 'rit-item' + (checked ? ' done' : '');
    el.innerHTML = `<label class="rit-row">
        <input type="checkbox" ${checked ? 'checked' : ''}>
        <div class="rit-item-desc">${a.text}</div>
      </label>`;
    el.querySelector('input').onchange = async (e)=>{
      actionsData[a.id] = e.target.checked;
      el.classList.toggle('done', e.target.checked);
      await saveFinanzasActions(actionsData);
    };
    actionsList.appendChild(el);
  });
}

// ---------- Tabs ----------
function setActiveTab(id){
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if(btn) btn.classList.add('active');
}

document.getElementById('tab-daily').onclick = ()=>{ setActiveTab('tab-daily'); renderDashboard(); };
document.getElementById('tab-rituales').onclick = ()=>{ setActiveTab('tab-rituales'); renderRituales(); };
document.getElementById('tab-nutricion').onclick = ()=>{ setActiveTab('tab-nutricion'); renderNutricion(); };
document.getElementById('tab-ejercicio').onclick = ()=>{ setActiveTab('tab-ejercicio'); renderEjercicio(); };
document.getElementById('tab-hogar').onclick = ()=>{ setActiveTab('tab-hogar'); renderHogar(); };
document.getElementById('tab-learning').onclick = ()=>{ setActiveTab('tab-learning'); renderLearning(); };
document.getElementById('tab-finanzas').onclick = ()=>{ setActiveTab('tab-finanzas'); renderFinanzas(); };

renderDashboard();

</script>
</body>
</html>
